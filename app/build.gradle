apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace 'jp.myuser.supercatapp'
    // ★ compileSdkも35に合わせます
    compileSdk 35

    defaultConfig {
        applicationId "jp.myuser.supercatapp"
        minSdk 24
        // ★ ここを35に！
        targetSdk 35
        versionCode 177
        versionName "1.0.177"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0' // API 35対応のため少し新しく
    implementation 'androidx.core:core-ktx:1.15.0'      // 同上
    
    // Google Play API
    implementation 'com.google.android.play:review:2.0.1'
    implementation 'com.google.android.play:review-ktx:2.0.1'
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation 'com.google.android.play:app-update-ktx:2.1.0'
    
    implementation 'com.google.android.material:material:1.12.0'
    // Face Mesh Detection (軽量なバンドル版)
    implementation 'com.google.mlkit:face-mesh-detection:16.0.0-beta3'
}
