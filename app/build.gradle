plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'jp.myuser.supercatapp'
    compileSdk 35

    defaultConfig {
        applicationId "jp.myuser.supercatapp"
        minSdk 24
        targetSdk 35
        // ★ バージョンをさらに1つ上げました
        versionCode 187
        versionName "1.0.187"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // 【容量節約技】日本語リソースのみに絞り、アプリ容量を数百KB削減
        resConfigs "ja"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true // 【容量節約技】未使用のリソースを自動削除
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    // ★ 16KBアライメントエラー（16 KB page size compatibility）を回避する設定
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // Play Core & Review (アプリ内アップデート・レビュー用)
    implementation 'com.google.android.play:review:2.0.1'
    implementation 'com.google.android.play:review-ktx:2.0.1'
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation 'com.google.android.play:app-update-ktx:2.1.0'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
