plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

// ★ ここに好きなアプリ名（半角英数字のみ）を入れてください
def appName = "supercatapp" 
// ★ ここにあなたの名前（半角英数字のみ）を入れてください
def developerName = "myuser"

android {
    // パッケージ名を自動生成 (例: jp.myuser.supercatapp)
    namespace "jp.${developerName}.${appName}"
    compileSdk 35

    defaultConfig {
        applicationId "jp.${developerName}.${appName}"
        minSdk 24
        targetSdk 35
        versionCode 1.1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    signingConfigs {
        release {
            storeFile file("my-release-key.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}
