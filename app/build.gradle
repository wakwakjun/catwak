apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace 'jp.myuser.supercatapp'
    compileSdk 35

    defaultConfig {
        applicationId "jp.myuser.supercatapp"
        minSdk 24
        targetSdk 35
        // ★ ここを更新！以前より大きい数字にします
        versionCode 186
        versionName "1.0.186"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
    packaging {
        jniLibs {
            // ★ ネイティブライブラリを圧縮せず、16KB境界でアライメントする設定
            useLegacyPackaging = false
        }
    }

    // ★ Android Gradle Plugin 8.3以降なら、以下のプロパティをgradle.propertiesに書くのが推奨ですが、
    // ここで直接アライメントを制御するよう指示します。
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0' // API 35対応のため少し新しく
    implementation 'androidx.core:core-ktx:1.15.0'      // 同上
    
    // Google Play API
    implementation 'com.google.android.play:review:2.0.1'
    implementation 'com.google.android.play:review-ktx:2.0.1'
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation 'com.google.android.play:app-update-ktx:2.1.0'
    
    implementation 'com.google.android.material:material:1.12.0'
    // Face Mesh Detection (軽量なバンドル版)
    implementation 'com.google.mlkit:face-mesh-detection:16.0.0-beta3'
}
