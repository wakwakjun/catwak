plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

def appName = "supercatapp" 
def developerName = "myuser"

android {
    namespace "jp.${developerName}.${appName}"
    compileSdk 35

    // GitHub Actions から渡されるビルド番号を数値として取得
    def githubRunNumber = System.getenv("GITHUB_RUN_NUMBER") ?: "1"
    def autoVersionCode = githubRunNumber.toInteger()
    def autoVersionName = "1.0.${githubRunNumber}"

    defaultConfig {
        applicationId "jp.myuser.supercatapp"
        minSdk 24
        targetSdk 35
        
        versionCode autoVersionCode
        versionName autoVersionName

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            // Actions側の環境変数名と一致させています
            storeFile file("release-key.jks") 
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            
            // ★ジャイアントキリング設定：未使用コードとリソースを極限まで削る
            minifyEnabled true      // 未使用コード削除（サイズ減 & 難読化）
            shrinkResources true    // 未使用リソース削除（WebP化と合わせて最強）
            
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    // AABを各デバイス向けに最適化して配信する設定
    bundle {
        language { enableSplit = true }
        density { enableSplit = true }
        abi { enableSplit = true }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}
