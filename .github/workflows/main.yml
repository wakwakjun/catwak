name: Build Android App

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # --- 画像軽量化ステップ ---
      - name: Install WebP Tools
        run: sudo apt-get install -y webp

      - name: Convert Images to WebP
        run: |
          find app/src/main/res/drawable -type f \( -name "*.png" -o -name "*.jpg" \) -exec sh -c 'cwebp -q 75 "$1" -o "${1%.*}.webp" && rm "$1"' _ {} \; || true

      # 1. Base64文字列からキーストアファイル(.jks)を復元
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks

      # 2. 軽量化された画像とバージョン番号を使ってビルドを実行
      - name: Build AAB and APK
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            -PVERSION_CODE=${{ github.run_number }} \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 3. Playストア用のAABを保存
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: cat-app-bundle-aab
          path: app/build/outputs/bundle/release/*.aab

      # 4. エミュレータ・実機確認用のAPKを保存
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cat-app-apk
          path: app/build/outputs/apk/release/*.apk
